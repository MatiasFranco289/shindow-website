<!-- Image carousel -->
<div class="carousel-upper">

    <div class="carousel-item">
      <img src="../gifs/login.gif" alt="login_example.gif" />

      <p>You can login in different ways</p>
    </div>

    <div class="carousel-item">
      <img src="../gifs/navigation.gif" alt="navigation_example.gif" />

      <p>You can navigate through directories</p>
    </div>

    <div class="carousel-item">
      <img
        src="../gifs/manageResources.gif"
        alt="manage_resources_example.gif"
