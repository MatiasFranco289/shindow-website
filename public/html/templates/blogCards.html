<div class="blog-card">
  <h2>{title}</h2>
  <div class="upper-section">
    <div class="pfp-wrapper">
      <img src="../images/profilePhoto.png" alt="pfp.png" />
    </div>

    <div class="right-upper">
      <div class="subtitles">
        <h3>{nickname}</h3>
        <p style="color: slategray">{date}</p>
      </div>

      <p style="color: slategray">{name}</p>
    </div>
  </div>

  <div class="body-blog">{message}</div>
</div>
